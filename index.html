<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISMA · Sistema Analisi Costi Agrumari</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e2a;--surf:#1e2230;--surf2:#252a3a;
  --bor:#2e3448;--bor2:#3a4060;
  --acc:#e8a44a;--acc2:#c07820;--acc-g:rgba(232,164,74,.15);
  --grn:#4ecb8c;--grn-g:rgba(78,203,140,.12);
  --blu:#5b9cf6;--blu-g:rgba(91,156,246,.12);
  --red:#f27070;--red-g:rgba(242,112,112,.1);
  --pur:#a78bfa;--pur-g:rgba(167,139,250,.12);
  --txt:#e8eaf2;--txt2:#a0a8c0;--txt3:#6a7290;
  --fd:'DM Serif Display',serif;--fb:'DM Sans',sans-serif;
  --sb:260px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.6;min-height:100vh;display:flex}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sb);min-width:var(--sb);height:100vh;position:sticky;top:0;
  background:var(--bg2);border-right:1px solid var(--bor);
  display:flex;flex-direction:column;overflow:hidden;z-index:100;
}
.sb-head{
  padding:18px 16px 14px;border-bottom:1px solid var(--bor);
  display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.sb-logo{
  width:36px;height:36px;min-width:36px;border-radius:9px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 4px 12px rgba(232,164,74,.3);
}
.sb-title{font-family:var(--fd);font-size:18px;color:var(--txt)}
.sb-sub{font-size:10px;color:var(--txt3);letter-spacing:.5px}

/* Upload area in sidebar */
.sb-upload{
  margin:12px;border:1.5px dashed var(--bor2);border-radius:10px;
  padding:12px;text-align:center;cursor:pointer;transition:all .2s;flex-shrink:0;
}
.sb-upload:hover{border-color:var(--acc);background:var(--acc-g)}
.sb-upload input{display:none}
.sb-upload .up-icon{font-size:20px;margin-bottom:4px}
.sb-upload .up-text{font-size:11px;color:var(--txt3);line-height:1.4}
.sb-upload .up-text strong{color:var(--acc);display:block;font-size:12px}

.sb-status{
  margin:0 12px 8px;padding:8px 10px;border-radius:8px;
  font-size:11px;display:none;
}
.sb-status.ok{background:var(--grn-g);color:var(--grn);border:1px solid rgba(78,203,140,.25);display:flex;align-items:center;gap:6px}
.sb-status.err{background:var(--red-g);color:var(--red);border:1px solid rgba(242,112,112,.25);display:flex;align-items:center;gap:6px}

.sb-nav{flex:1;overflow-y:auto;padding:4px 0 16px}
.sb-nav::-webkit-scrollbar{width:4px}
.sb-nav::-webkit-scrollbar-track{background:transparent}
.sb-nav::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:2px}

/* Nav groups */
.nav-group{margin-bottom:2px}
.nav-group-header{
  display:flex;align-items:center;gap:8px;padding:8px 14px;
  cursor:pointer;user-select:none;transition:background .15s;
  font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--txt3);
}
.nav-group-header:hover{background:rgba(255,255,255,.03)}
.nav-group-arrow{margin-left:auto;font-size:10px;transition:transform .2s;color:var(--txt3)}
.nav-group-header.open .nav-group-arrow{transform:rotate(90deg)}
.nav-group-items{display:none;padding:0 8px 4px}
.nav-group-items.open{display:block}

.nav-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;
  cursor:pointer;transition:all .15s;color:var(--txt2);font-size:12.5px;
  border:1px solid transparent;text-decoration:none;
}
.nav-item:hover{background:var(--surf);color:var(--txt)}
.nav-item.active{background:var(--acc-g);color:var(--acc);border-color:rgba(232,164,74,.2)}
.nav-item .nav-ico{font-size:14px;min-width:18px;text-align:center}
.nav-item .nav-badge{
  margin-left:auto;font-size:9px;font-weight:700;padding:1px 5px;
  border-radius:10px;background:var(--surf2);color:var(--txt3);
}
.nav-item.active .nav-badge{background:rgba(232,164,74,.2);color:var(--acc)}

/* Export button */
.sb-export{
  margin:8px 12px 12px;padding:9px;border-radius:9px;
  background:linear-gradient(135deg,rgba(78,203,140,.15),rgba(78,203,140,.08));
  border:1px solid rgba(78,203,140,.25);color:var(--grn);
  font-size:12px;font-weight:600;cursor:pointer;text-align:center;
  transition:all .2s;flex-shrink:0;display:none;
}
.sb-export:hover{background:rgba(78,203,140,.22)}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.topbar{
  height:58px;flex-shrink:0;background:rgba(13,15,20,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--bor);padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
}
.breadcrumb{font-size:13px;color:var(--txt3);display:flex;align-items:center;gap:6px}
.breadcrumb .cur{color:var(--txt);font-weight:600}
.topbar-pills{display:flex;align-items:center;gap:8px}
.pill{
  display:flex;align-items:center;gap:5px;padding:4px 12px;
  background:var(--surf);border:1px solid var(--bor);border-radius:20px;
  font-size:11px;color:var(--txt2);
}
.pill .dot{width:6px;height:6px;border-radius:50%;background:var(--grn)}

.content-area{flex:1;overflow-y:auto;overflow-x:hidden}
.content-area::-webkit-scrollbar{width:6px}
.content-area::-webkit-scrollbar-track{background:var(--bg)}
.content-area::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:3px}

/* ── PAGES ── */
.page{display:none;padding:28px 32px;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── WELCOME SCREEN ── */
.welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 58px);text-align:center;padding:40px;
}
.welcome-logo{
  width:80px;height:80px;border-radius:20px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 8px 32px rgba(232,164,74,.3);margin-bottom:24px;
}
.welcome h1{font-family:var(--fd);font-size:38px;margin-bottom:10px}
.welcome p{color:var(--txt2);font-size:15px;max-width:480px;line-height:1.7;margin-bottom:32px}
.upload-big{
  border:2px dashed var(--bor2);border-radius:16px;padding:40px 60px;
  cursor:pointer;transition:all .2s;display:inline-block;
}
.upload-big:hover{border-color:var(--acc);background:var(--acc-g)}
.upload-big input{display:none}
.upload-big .ub-icon{font-size:40px;margin-bottom:12px}
.upload-big .ub-title{font-family:var(--fd);font-size:20px;color:var(--acc);margin-bottom:6px}
.upload-big .ub-sub{font-size:13px;color:var(--txt3)}

/* ── TYPOGRAPHY ── */
.ey{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--acc);margin-bottom:5px}
.ptit{font-family:var(--fd);font-size:28px;line-height:1.2;color:var(--txt)}
.psub{font-size:13px;color:var(--txt2);margin-top:4px;margin-bottom:22px}
.stit{
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bor);
  display:flex;align-items:center;gap:8px;margin-top:20px;
}
.stit:first-child{margin-top:0}
.stit::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--acc)}

/* ── KPI ── */
.kr{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:22px}
.kc{
  background:var(--surf);border:1px solid var(--bor);border-radius:12px;
  padding:16px 18px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;
}
.kc:hover{border-color:var(--bor2);transform:translateY(-1px)}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:12px 12px 0 0}
.kc.a::before{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.kc.g::before{background:var(--grn)}
.kc.b::before{background:var(--blu)}
.kc.r::before{background:var(--red)}
.kc.p::before{background:var(--pur)}
.kl{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kv{font-family:var(--fd);font-size:24px;color:var(--txt);line-height:1}
.ku{font-size:11px;color:var(--txt2);margin-left:2px}
.ks{font-size:11px;color:var(--txt3);margin-top:4px}
.kd{display:inline-flex;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-top:3px}
.kd.p{background:var(--grn-g);color:var(--grn)}
.kd.n{background:var(--red-g);color:var(--red)}

/* ── INPUTS ── */
.irow{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap}
.irow label{font-size:12px;color:var(--txt2);font-weight:500;min-width:200px}
input[type=number],select,input[type=text]{
  background:var(--bg3);border:1px solid var(--bor2);border-radius:7px;
  color:var(--txt);font-family:var(--fb);font-size:13px;padding:6px 11px;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input[type=number]{color:var(--acc);font-family:var(--fd);font-size:14px;width:140px}
input[type=number]:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--acc-g)}
select{cursor:pointer;min-width:200px}
select option{background:var(--bg3)}
.ibox{background:var(--surf);border:1px solid var(--bor);border-radius:12px;padding:18px 20px;margin-bottom:20px}
.ibox h4{font-size:12px;font-weight:700;color:var(--txt);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--bor);text-transform:uppercase;letter-spacing:.8px}

/* ── TABLES ── */
.tw{background:var(--surf);border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:18px}
.tw-head{padding:12px 16px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between}
.tw-head h3{font-size:13px;font-weight:600;color:var(--txt)}
.tw-head span{font-size:11px;color:var(--txt3)}
.tw-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg3);padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);white-space:nowrap}
td{padding:8px 12px;border-top:1px solid var(--bor);font-size:12px;color:var(--txt2);vertical-align:middle}
tr:hover td{background:var(--bg3)}
td.n{font-family:var(--fd);font-size:13px;color:var(--txt);text-align:right;white-space:nowrap}
td.av{color:var(--acc)!important;font-weight:600}
td.gv{color:var(--grn)!important}
td.rv{color:var(--red)!important}
td.bv{color:var(--blu)!important}
td.lc{font-weight:500;color:var(--txt)}
td.sl{color:var(--txt3);font-size:11px;padding-left:24px}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tag.y{background:var(--grn-g);color:var(--grn)}
.tag.no{background:rgba(160,168,192,.08);color:var(--txt3)}
.tag.ind{background:var(--blu-g);color:var(--blu)}
td select{background:var(--bg3);border:1px solid var(--bor2);border-radius:6px;color:var(--acc);font-size:11px;padding:3px 7px;cursor:pointer;outline:none}
td select:focus{border-color:var(--acc)}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px}
@media(max-width:1200px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.g3{grid-template-columns:1fr}}

/* ── INFO CARD ── */
.ic{background:var(--surf);border:1px solid var(--bor);border-radius:12px;padding:16px 18px}
.ic h4{font-size:11px;font-weight:700;color:var(--txt);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bor);text-transform:uppercase;letter-spacing:.8px}
.ir{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid rgba(46,52,72,.4)}
.ir:last-child{border-bottom:none}
.ik{font-size:11px;color:var(--txt3)}
.iv{font-size:12px;font-weight:600;color:var(--txt);text-align:right}
.iv.a{color:var(--acc)}.iv.g{color:var(--grn)}.iv.r{color:var(--red)}.iv.b{color:var(--blu)}
.sep{border-top:2px solid var(--bor2)!important;margin-top:4px;padding-top:8px!important}
.sep2{border-top:2px solid var(--acc)!important;margin-top:4px;padding-top:8px!important}

/* ── HIGHLIGHT ── */
.hl{
  background:linear-gradient(135deg,rgba(232,164,74,.08),rgba(192,120,32,.04));
  border:1px solid rgba(232,164,74,.2);border-radius:12px;padding:16px 20px;
  margin-bottom:20px;display:flex;align-items:center;gap:16px;
}
.hl-ico{font-size:28px;flex-shrink:0}
.hl h3{font-family:var(--fd);font-size:17px;color:var(--acc)}
.hl p{font-size:12px;color:var(--txt2);margin-top:2px}

/* ── PROGRESS ── */
.pr{margin-bottom:10px}
.prh{display:flex;justify-content:space-between;margin-bottom:4px}
.prl{font-size:11px;color:var(--txt2)}
.prv{font-size:11px;font-weight:600;color:var(--txt)}
.prb{height:5px;background:var(--bg3);border-radius:10px;overflow:hidden}
.prf{height:100%;border-radius:10px;transition:width .8s ease}
.fa{background:linear-gradient(90deg,var(--acc),var(--acc2))}
.fg{background:var(--grn)}.fb{background:var(--blu)}
.fr{background:var(--red)}.fd2{background:var(--txt3)}

/* ── TOGGLE ── */
.sw{position:relative;display:inline-block;width:40px;height:20px}
.sw input{opacity:0;width:0;height:0}
.sl2{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg3);border:1px solid var(--bor2);border-radius:20px;transition:.25s}
.sl2::before{position:absolute;content:'';height:14px;width:14px;left:3px;bottom:2px;background:var(--txt3);border-radius:50%;transition:.25s}
input:checked+.sl2{background:var(--grn-g);border-color:var(--grn)}
input:checked+.sl2::before{transform:translateX(20px);background:var(--grn)}

/* ── CHART ── */
.ch-wrap{background:var(--surf);border:1px solid var(--bor);border-radius:12px;padding:16px 18px;margin-bottom:18px}
.ch-wrap h4{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bor)}

/* ── PKG CARDS ── */
.pkcg{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px;margin-bottom:20px}
.pkc{background:var(--surf);border:1px solid var(--bor);border-radius:10px;padding:13px;transition:border-color .2s,transform .2s;cursor:pointer}
.pkc:hover{border-color:var(--bor2);transform:translateY(-2px)}
.pkc.sel{border-color:rgba(232,164,74,.45);background:linear-gradient(135deg,rgba(232,164,74,.06),var(--surf))}
.pkn{font-size:12px;font-weight:600;color:var(--txt);margin-bottom:2px}
.pkw{font-size:10px;color:var(--txt3);margin-bottom:7px}

/* ── NOTE ── */
.nb2{background:var(--bg3);border:1px solid var(--bor);border-left:3px solid var(--blu);border-radius:0 9px 9px 0;padding:10px 14px;font-size:12px;color:var(--txt2);margin-bottom:16px;line-height:1.6}
.nb2 strong{color:var(--blu)}
.nb-warn{border-left-color:var(--acc)}
.nb-warn strong{color:var(--acc)}

/* ── DATA TABLE (fogli parametri raw) ── */
.raw-table-wrap{background:var(--surf);border:1px solid var(--bor);border-radius:12px;overflow:hidden;margin-bottom:18px}
.raw-table-scroll{overflow:auto;max-height:500px}
.raw-table-scroll::-webkit-scrollbar{width:4px;height:4px}
.raw-table-scroll::-webkit-scrollbar-thumb{background:var(--bor2);border-radius:2px}
.raw-table{width:100%;border-collapse:collapse;font-size:11px}
.raw-table th{background:var(--bg3);padding:7px 10px;text-align:left;color:var(--txt3);font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2}
.raw-table td{padding:6px 10px;border-top:1px solid var(--bor);color:var(--txt2);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.raw-table tr:hover td{background:var(--bg3);color:var(--txt)}
.raw-table td.cell-blue{color:var(--acc);font-weight:600}
.raw-table td.cell-green{color:var(--grn)}
.raw-table td.cell-num{text-align:right;font-family:var(--fd)}

/* ── FOOTER ── */
.pf{margin-top:32px;padding-top:16px;border-top:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;color:var(--txt3);font-size:11px}

/* ── BADGE ── */
.badge-ok{display:inline-flex;align-items:center;padding:3px 10px;background:var(--grn-g);border:1px solid rgba(78,203,140,.3);border-radius:20px;font-size:11px;color:var(--grn);font-weight:600}
.badge-warn{display:inline-flex;align-items:center;padding:3px 10px;background:var(--red-g);border:1px solid rgba(242,112,112,.3);border-radius:20px;font-size:11px;color:var(--red);font-weight:600}
.badge-info{display:inline-flex;align-items:center;padding:3px 10px;background:var(--acc-g);border:1px solid rgba(232,164,74,.3);border-radius:20px;font-size:11px;color:var(--acc);font-weight:600}

@media(max-width:900px){
  :root{--sb:200px}
  .page{padding:16px}
  .kr{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     SIDEBAR
═══════════════════════════════════════ -->
<nav class="sidebar" id="sidebar">
  <div class="sb-head">
    <div class="sb-logo">🍊</div>
    <div><div class="sb-title">PRISMA</div><div class="sb-sub">Sistema Analisi Costi</div></div>
  </div>

  <!-- Upload -->
  <label class="sb-upload" id="sb-upload-label">
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="loadFile(this)">
    <div class="up-icon">📂</div>
    <div class="up-text"><strong>Carica PRISMA.xlsx</strong>Trascina o clicca per caricare</div>
  </label>
  <div class="sb-status" id="sb-status"></div>

  <!-- Navigation -->
  <div class="sb-nav" id="sb-nav">
    <!-- groups rendered by JS -->
  </div>

  <!-- Export -->
  <button class="sb-export" id="sb-export" onclick="exportXLSX()">📥 Esporta PRISMA.xlsx</button>
</nav>

<!-- ═══════════════════════════════════════
     MAIN
═══════════════════════════════════════ -->
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="topbar-bc">PRISMA <span style="opacity:.4">›</span> <span class="cur" id="topbar-title">Benvenuto</span></div>
    <div class="topbar-pills">
      <div class="pill" id="pill-agrume" style="display:none"><span>🍊</span><span id="pill-agr-txt">Limone</span></div>
      <div class="pill" id="pill-kg" style="display:none"><div class="dot"></div><span id="pill-kg-txt">100.000 kg</span></div>
      <div class="pill" id="pill-file" style="display:none"><span id="pill-file-txt">—</span></div>
    </div>
  </div>

  <div class="content-area">
    <!-- WELCOME PAGE -->
    <div id="page-welcome" class="active" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 58px);text-align:center;padding:40px">

// CARICAMENTO FILE
// ═══════════════════════════════════════════════════════════════
function loadFile(input){
  const file = input.files[0];
  if(!file) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      WB = XLSX.read(e.target.result, { type:'array', cellStyles:true, cellNF:true });
      // Parse ogni foglio
      SHEETS = {};
      WB.SheetNames.forEach(name => {
        const ws = WB.Sheets[name];
        SHEETS[name] = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
      });
      CELL_DATA = {};
      WB.SheetNames.forEach(name => {
        CELL_DATA[name] = {};
        const ws = WB.Sheets[name];
        Object.keys(ws).forEach(addr => {
          if(addr[0]==='!') return;
          CELL_DATA[name][addr] = ws[addr];
        });
      });
      showStatus('ok', `✓ ${file.name} — ${WB.SheetNames.length} fogli caricati`);
      document.getElementById('sb-export').style.display = 'block';
      document.getElementById('pill-file').style.display = 'flex';
      document.getElementById('pill-file-txt').textContent = file.name;
      buildNav();
      populateInputsFromXLSX();
      navigateTo('dash-trasf');
    } catch(err){
      showStatus('err', '✗ Errore lettura file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showStatus(type, msg){
  const el = document.getElementById('sb-status');
  el.className = 'sb-status ' + type;
  el.textContent = msg;
}

}

function toggleGroup(header){

function applyPendingValues(){

  Object.entries(window._pendingXLSX).forEach(([id, val]) => {

function navigateTo(pageId){
  currentPage = pageId;
  // aggiorna nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-'+pageId)?.classList.add('active');
  // trova item
  let item = null;
  for(const g of NAV_GROUPS) {
    item = g.items.find(i=>i.id===pageId);
    if(item) break;
  }
  if(!item) return;
  // breadcrumb
  document.getElementById('topbar-title').textContent = item.label;
  document.getElementById('topbar-bc').innerHTML = `PRISMA <span style="opacity:.4">›</span> <span class="cur">${item.label}</span>`;
  // mostra pagina
  document.getElementById('page-welcome').style.display='none';
  renderPage(pageId, item);
  // scroll top
  document.querySelector('.content-area').scrollTop = 0;
}

// ═══════════════════════════════════════════════════════════════
// RENDER PAGINE
// ═══════════════════════════════════════════════════════════════
function renderPage(pageId, item){
  const container = document.getElementById('pages-container');
  // nascondi tutte le pagine esistenti
  container.querySelectorAll('.dyn-page').forEach(p => p.style.display='none');

  let existing = document.getElementById('page-'+pageId);
  if(!existing){
    // crea nuova pagina
    const div = document.createElement('div');
    div.id = 'page-'+pageId;
    div.className = 'page active dyn-page';
    div.innerHTML = buildPageHTML(pageId, item);
    container.appendChild(div);
  } else {
    existing.style.display = 'block';
  }
  // per dash-proc: ricostruisce sempre la tabella toggle (contiene gli stati correnti)
  if(pageId === 'dash-proc') buildProcTable();
  // applica valori dal file XLSX (se ancora in attesa)
  applyPendingValues();
  // (ri)esegui sempre i calcoli per questa pagina dopo che il DOM è pronto
  setTimeout(() => initPageCharts(pageId), 80);
}

function buildPageHTML(pageId, item){
  // Dashboard principali: HTML dedicato
  if(pageId==='dash-trasf')  return buildDashTrasf();
  if(pageId==='dash-proc')   return buildDashProc();
  if(pageId==='dash-imb')    return buildDashImb();
  if(pageId==='d-cu')        return buildCostiUnitari();
  if(pageId==='d-mix')       return buildMixPrezzi();
  // Tutti gli altri: tabella raw + possibilità input BLU
  return buildRawSheet(pageId, item);
}

// ═══════════════════════════════════════════════════════════════
// RAW SHEET VIEWER (fogli parametri, impianti, liste)
// ═══════════════════════════════════════════════════════════════
function buildRawSheet(pageId, item){
  const sheetName = item.sheet;
  const rows = SHEETS[sheetName];
  if(!rows || rows.length===0) return `<div class="page"><div class="ey">Foglio</div><h1 class="ptit">${item.label}</h1><div class="nb2"><strong>ℹ️</strong> Foglio non trovato nel file caricato.</div></div>`;

  // trova prima riga con dati significativi come header
  let hdrIdx = 0;
  for(let i=0;i<Math.min(5,rows.length);i++){
    if(rows[i].filter(c=>c!==''&&c!=null).length > 2){ hdrIdx=i; break; }
  }
  const hdrs = rows[hdrIdx];
  const dataRows = rows.slice(hdrIdx+1).filter(r=>r.some(c=>c!==''&&c!=null));

  // Identifica celle BLU cercando pattern "BLU" nelle prime righe
  const hasBluNote = rows.slice(0,3).some(r=>r.some(c=>String(c).toLowerCase().includes('blu')));

  let html = `
    <div class="ey">${item.icon} Foglio Excel</div>
    <h1 class="ptit">${item.label}</h1>
    <p class="psub">Foglio: <code style="background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px">${sheetName}</code> — ${dataRows.length} righe × ${hdrs.length} colonne</p>`;

  if(hasBluNote){
    html += `<div class="nb2 nb-warn"><strong>✏️ Valori BLU:</strong> Le celle in arancione sono input modificabili che si propagano automaticamente alle Dashboard collegate.</div>`;
  }

  html += `<div class="raw-table-wrap"><div class="raw-table-scroll"><table class="raw-table"><thead><tr>`;
  html += `<th>#</th>`;
  hdrs.forEach((h,i) => {
    const label = h!==''&&h!=null ? String(h).substring(0,40) : `Col ${i+1}`;
    html += `<th title="${String(h)}">${label}</th>`;
  });
  html += `</tr></thead><tbody>`;

  dataRows.slice(0, 200).forEach((row, ri) => {
    html += `<tr>`;
    html += `<td class="cell-num" style="color:var(--txt3);width:32px">${ri+1}</td>`;
    hdrs.forEach((_, ci) => {
      const val = row[ci];
      const isNum = val !== '' && val != null && !isNaN(+val) && val !== '';
      const isEmpty = val === '' || val == null;
      const isLabel = !isNum && !isEmpty;
      let cls = '';
      if(isNum) cls = 'cell-num';
      const display = isEmpty ? '' : isNum ? fmt(+val, String(val).includes('.') ? 4 : 0) : String(val).substring(0,80);
      html += `<td class="${cls}" title="${isEmpty?'':String(val)}">${display}</td>`;
    });
    html += `</tr>`;
  });
  if(dataRows.length > 200){
    html += `<tr><td colspan="${hdrs.length+1}" style="text-align:center;padding:12px;color:var(--txt3);font-size:11px">... ${dataRows.length-200} righe nascoste — tutti i dati sono in memoria</td></tr>`;
  }
  html += `</tbody></table></div></div>`;
  html += `<div class="pf"><span>PRISMA · ${item.label}</span><span>Fonte: ${sheetName} · ${dataRows.length} righe</span></div>`;
  return html;
}

function runTrasf(){
  const kwh=CU('cu-kwh'); const kg=gv('t-kg')||100000;
  const scar=SCARICO[gs('t-scarico')]||SCARICO['Bins+Magnoni'];
  const lprep=LINEE_PREP[gs('t-linea-prep')]||LINEE_PREP['D'];
  const ltrasf=LINEE_TRASF[gs('t-linea-trasf')]||LINEE_TRASF['B/SF'];
  const addKey=gs('t-linea-prep')==='D'?'cu-p4':'cu-p3';
  const ore3=kg/scar.portata, ore4=kg/lprep.portata, ore5=kg/ltrasf.portata;
  const resaS=(gv('t-resa-succo')||32)/100, resaT=(gv('t-resa-torch')||10)/100, resaSc=(gv('t-resa-scorze')||58)/100;
  const kgS=kg*resaS, kgT=kg*resaT, kgSc=kg*resaSc, kgSt=kg*0.0009;
  const ore7=kgS/RAFF_SUCCO.portata, ore8=kgT/RAFF_TORCH.portata;
  const cH3=scar.kw*kwh+scar.add*CU('cu-p3');
  const cH4=lprep.kw*kwh+lprep.add*CU(addKey);
  const cH5=ltrasf.kw*kwh+ltrasf.add*CU('cu-p5');
  const cH6=ltrasf.ckw*kwh+ltrasf.cadd*CU('cu-p6');
  const cTot3=cH3*ore3, cTot4=cH4*ore4, cTot5=cH5*ore5;
  const cTot6=cH6*ore5, cTot7=RAFF_SUCCO.kw*kwh*ore7, cTot8=RAFF_TORCH.kw*kwh*ore8;
  const cManut=gv('t-manut')||0;
  const cDir=cTot3+cTot4+cTot5+cTot6+cTot7+cTot8;
  const cPers=scar.add*CU('cu-p3')*ore3+lprep.add*CU(addKey)*ore4+ltrasf.add*CU('cu-p5')*ore5;
  const cEn=cDir-cPers;
  const oreInd=kg/5000;
  const cH_acq=CU('cu-p1')+2*kwh, cH_ric=CU('cu-p2')+2*kwh;
  const cTot_acq=cH_acq*oreInd, cTot_ric=cH_ric*oreInd;
  const pS=gv('t-prezzo-succo')||1.2525, pT=gv('t-prezzo-torch')||0.30, pSc=gv('t-prezzo-scorze')||0.006;
  const smalt=gv('t-smalt')||180;
  const ricS=kgS*pS, ricT=kgT*pT, ricSc=kgSc*pSc, cSmalt=kgSt*smalt/1000;
  const ricSub=ricT+ricSc;
  const cNetto=cDir-ricSub+cSmalt;
  const cNettoKg=kgS>0?cNetto/kgS:0, cNettoLt=cNettoKg/1.05;
  const marg=ricS-cNetto;

  // topbar pills
  const agr=gs('t-agrume');
  document.getElementById('pill-agrume').style.display='flex';
  document.getElementById('pill-agr-txt').textContent='🍊 '+agr;
  document.getElementById('pill-kg').style.display='flex';
  document.getElementById('pill-kg-txt').textContent='✓ '+fmtK(kg)+' kg';
  const aBadge=document.getElementById('p-agrume-badge');
  if(aBadge) aBadge.textContent='🍊 '+agr;
  const iBadge=document.getElementById('i-agrume-badge');
  if(iBadge) iBadge.textContent='🍊 '+agr;

  // compatibilità linea
  const lineeOk=COMPAT_LINEE[agr]||[];
  const lineaSel=gs('t-linea-trasf');
  const compatOk=lineeOk.includes(lineaSel);
  const selLinea=document.getElementById('t-linea-trasf');
  if(selLinea) Array.from(selLinea.options).forEach(o=>{
    const ok=lineeOk.includes(o.value); o.disabled=!ok;
    o.style.color=ok?'':'var(--red)';
    o.text=ok?o.value:o.value+' ✗';
  });
  const cb=document.getElementById('t-compat-badge');
  if(cb){cb.className=compatOk?'badge-ok':'badge-warn';cb.textContent=compatOk?'✓ Compatibile':'⚠ Non compatibile';}
  const kBadge=document.getElementById('t-kg-badge');
  if(kBadge) kBadge.textContent=fmtK(kg)+' kg';

  // KPI
  set('k-ctot',fmt(cDir+cManut,0)+'<span class="ku"> €</span>');
  set('k-ctot-s',fmt(cDir/kg,5)+' €/kg frutta');
  set('k-ricavo',fmt(ricS,0)+'<span class="ku"> €</span>');
  set('k-ricavo-s',fmtK(kgS)+' kg × '+fmt(pS,4)+' €/kg');
  set('k-margine',fmt(marg,0)+'<span class="ku"> €</span>');
  set('k-margine-s',fmt(marg/kgS,4)+' €/kg succo');
  set('k-netto',fmt(cNettoLt,5)+'<span class="ku"> €/lt</span>');
  set('k-netto-s',cNetto<=0?'✓ Costo netto negativo':'Costo netto sul succo');
  if(ricSub>=cDir){
    set('hl-title','I ricavi da sottoprodotti coprono interamente il costo di trasformazione');
    set('hl-body','Sottoprod.: '+fmtE(ricSub,0)+' · Costo diretto: '+fmtE(cDir,0)+' · Costo netto: '+fmtE(cNetto,2));
  } else {
    set('hl-title','Costo netto sul succo: '+fmtE(cNetto,2));
    set('hl-body','Costo diretto: '+fmtE(cDir,0)+' · Ricavi sottoprod.: '+fmtE(ricSub,0)+' · Margine lordo: '+fmtE(marg,0));
  }

  // Tabella fasi
  const fasi=[
    {n:'3. Scarico frutta',opt:gs('t-scarico'),kw:scar.kw,ore:ore3,ch:cH3,tot:cTot3},

function toggleProc(id){
  procStato[id]=!!document.getElementById('psw-'+id)?.checked;
  const row=document.getElementById('ptr-'+id);
  if(row) row.style.opacity=procStato[id]?'1':'0.45';
  runProc();
}

function runProc(){
  const kwh=CU('cu-kwh'), vap=CU('cu-vap');
  const volBase=gv('p-vol')||32000;
  set('pk-vol',fmtK(volBase)+'<span class="ku">lt</span>');
  set('p-vol-badge',fmtK(volBase)+' lt');
  set('proc-vol-ref','Rif.: '+fmtK(volBase)+' lt');
  let volC=volBase, cTotP=0, cEn=0, cVap=0, cPers=0;
  const cascata=[];
  PROC_DEF.forEach(p=>{
    const on=procStato[p.id]; const pp=getProcParams(p.id); const cAddH=CU(p.addKey);
    if(on&&volC>0){
      const ore=volC/pp.portata, cE=pp.kw*kwh*ore, cV=pp.vap?vap*pp.vapKgH*ore:0;
      const cP=p.add*cAddH*ore, cT=cE+cV+cP;
      const perd=pp.pFissa+volC*(1-pp.resa), vOut=Math.max(0,volC-perd);
      set('pv-'+p.id,fmtK(volC)); set('pport-'+p.id,fmtK(pp.portata)+' lt/h');
      set('po-'+p.id,fmt(ore,2)); set('pkw-'+p.id,fmt(pp.kw,2));
      set('pen-'+p.id,fmt(cE,2)); set('pvap-'+p.id,pp.vap?fmt(cV,2):'—');
      set('ppe-'+p.id,fmt(cP,2)); set('ptot-'+p.id,fmt(cT,2));
      set('pelt-'+p.id,fmt(cT/volBase,5));
      cTotP+=cT; cEn+=cE; cVap+=cV; cPers+=cP;
      cascata.push({nome:p.nome,on:true,vIn:volC,perd,vOut,resa:vOut/volC*100,cT});
      volC=vOut;
    } else {
      const pp2=getProcParams(p.id);
      set('pv-'+p.id,'—'); set('pport-'+p.id,fmtK(pp2.portata)+' lt/h');
      set('po-'+p.id,'—'); set('pkw-'+p.id,fmt(pp2.kw,2));
      ['pen','pvap','ppe','ptot','pelt'].forEach(x=>set(x+'-'+p.id,'—'));
      cascata.push({nome:p.nome,on:false,vIn:0,perd:0,vOut:0,resa:0,cT:0});
    }
  });
  const resaFil=volBase>0?volC/volBase*100:0;
  set('pk-ctot',fmt(cTotP,2)+'<span class="ku"> €</span>');
  set('pk-ctot-s',fmt(volBase>0?cTotP/volBase:0,5)+' €/lt');
  set('pk-fil',fmt(volBase>0?cTotP/volBase:0,5)+'<span class="ku"> €/lt</span>');
  set('pk-resa',fmt(resaFil,2)+'<span class="ku"> %</span>');
  set('pk-resa-s',fmtK(volC)+' lt uscita finale');
  set('proc-riep-box',`
    <div class="ir"><span class="ik">Costo energia totale</span><span class="iv b">${fmtE(cEn,2)}</span></div>
    <div class="ir"><span class="ik">Costo vapore totale</span><span class="iv g">${fmtE(cVap,2)}</span></div>
    <div class="ir"><span class="ik">Costo personale totale</span><span class="iv">${fmtE(cPers,2)}</span></div>
    <div class="ir sep"><span class="ik" style="font-weight:700;color:var(--txt)">★ TOTALE PROCESSI</span><span class="iv a">${fmtE(cTotP,2)}</span></div>
    <div class="ir"><span class="ik">Costo €/lt ingresso</span><span class="iv a">${fmt(volBase>0?cTotP/volBase:0,5)} €/lt</span></div>
    <div class="ir"><span class="ik">Volume uscita finale</span><span class="iv g">${fmtK(volC)} lt</span></div>
    <div class="ir"><span class="ik">Resa totale filiera</span><span class="iv g">${fmt(resaFil,2)}%</span></div>`);
  let cHtml=`<div class="ir"><span class="ik">Volume ingresso</span><span class="iv">${fmtK(volBase)} lt</span></div>`;
  cascata.filter(c=>c.on).forEach(c=>{
    cHtml+=`<div class="ir"><span class="ik">${c.nome} → uscita</span><span class="iv g">${fmtK(c.vOut)} lt</span></div>
      <div class="ir"><span class="ik">Perdita</span><span class="iv r">${fmt(c.perd,1)} lt</span></div>
      <div class="ir"><span class="ik">Resa processo</span><span class="iv g">${fmt(c.resa,2)}%</span></div>`;
  });
  cHtml+=`<div class="ir sep2"><span class="ik" style="font-weight:700;color:var(--acc)">RESA TOTALE FILIERA</span><span class="iv a">${fmt(resaFil,2)}%</span></div>`;
  set('proc-cascata-box',cHtml);
  const agr=gs('t-agrume')||'Limone';
  const pkgMap={'Limone':'ACMA, Goglio, Galdi (Rex), Magnoni (Latte, Vaschette, FBL, F.F.)','Mandarino':'Galdi, Magnoni (Vaschette, Latte, F.F.), FBL','Arancia':'Galdi (Rex), Magnoni (F.F. Standard), 400','Bergamotto':'Magnoni (F.F. NAT), GOE EST+400, BOE+1100'};
  set('proc-pkg-note',`<strong>📌 Packaging compatibile ${agr}:</strong> ${pkgMap[agr]||'—'}`);

  const att=cascata.filter(c=>c.on&&c.cT>0);
  mkChart('ch-p-bar','bar',{
    labels:att.length?att.map(c=>c.nome.split('(')[0].trim().substring(0,14)):['Nessun processo'],
    datasets:[{data:att.length?att.map(c=>+c.cT.toFixed(2)):[0],
      backgroundColor:att.length?att.map((_,i)=>COLS[i%COLS.length]):['rgba(106,114,144,.5)'],
      borderRadius:5,borderSkipped:false}]
  },barOpts());
  const attC=cascata.filter(c=>c.on);
  mkChart('ch-p-cascata','bar',{
    labels:attC.length?attC.map(c=>c.nome.split('(')[0].trim().substring(0,12)):['Ingresso'],
    datasets:[
      {label:'Entrata (lt)',data:attC.length?attC.map(c=>+c.vIn.toFixed(0)):[volBase],backgroundColor:'rgba(91,156,246,.3)',borderColor:'rgba(91,156,246,.8)',borderWidth:1.5,borderRadius:4},
      {label:'Uscita (lt)',data:attC.length?attC.map(c=>+c.vOut.toFixed(0)):[volBase],backgroundColor:'rgba(78,203,140,.3)',borderColor:'rgba(78,203,140,.8)',borderWidth:1.5,borderRadius:4}
    ]
  },{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:'#a0a8c0',padding:10,font:{size:10},boxWidth:10}},tooltip:TIP},scales:{x:{grid:{display:false},ticks:{color:'#6a7290'}},y:{grid:GRID,ticks:{color:'#6a7290'}}}});
}

function runImb(){
  const selKey=gs('i-pkg')||'ff190';
  const agr=gs('t-agrume')||'Limone';
  const linea=gs('t-linea-trasf')||'B/SF';
  const pkg=PKG_DATA[selKey]; if(!pkg) return;
  const allCosts={};
  Object.keys(PKG_DATA).forEach(k=>{const c=getPkgCosto(k,agr);allCosts[k]={costo:c,ck:c/PKG_DATA[k].peso};});
  const compatList=(COMPAT_PKG[agr]&&COMPAT_PKG[agr][linea])||Object.keys(PKG_DATA);
  const sel=allCosts[selKey];
  const allE=Object.entries(allCosts);
  const pool=allE.filter(([k])=>compatList.includes(k));
  const ppool=pool.length?pool:allE;
  const minE=ppool.reduce((a,b)=>a[1].ck<b[1].ck?a:b);
  const maxE=ppool.reduce((a,b)=>a[1].ck>b[1].ck?a:b);
  set('ik-unita',fmt(sel.costo,3)+'<span class="ku"> €/unità</span>');
  set('ik-unita-s',pkg.nome+' · '+pkg.peso+' kg netti');
  set('ik-kg',fmt(sel.ck,5)+'<span class="ku"> €/kg</span>');
  set('ik-kg-s',pkg.peso+' kg netti per unità');
  set('ik-min',fmt(minE[1].ck,5)+'<span class="ku"> €/kg</span>');
  set('ik-min-s',PKG_DATA[minE[0]].nome+' (compat.)');
  set('ik-max',fmt(maxE[1].ck,5)+'<span class="ku"> €/kg</span>');
  set('ik-max-s',PKG_DATA[maxE[0]].nome+' (compat.)');
  set('imb-det-title',`<span style="width:3px;height:3px;border-radius:50%;background:var(--acc);display:inline-block;margin-right:7px"></span>Componenti — ${pkg.nome}`);
  const compData=pkg.comp.map(c=>{
    let key=c.k;
    if(key==='_rex_dynamic') key=getRexKey(agr);
    if(key==='_crex_dynamic') key=getCartRexKey(agr);
    const vu=CU(key)||0; return {n:c.n,q:c.q,vu,val:c.q*vu};
  });
  let tot=0; compData.forEach(c=>{tot+=c.val;});
  set('imb-comp-tbody',compData.map(c=>`<tr><td class="lc">${c.n}</td>
    <td class="n">${fmt(c.q,4)}</td><td class="n">${fmt(c.vu,4)}</td>
    <td class="n av">${fmt(c.val,4)}</td></tr>`).join('')+
    `<tr style="background:var(--bg3)"><td class="lc" colspan="3"><strong>Costo totale</strong></td>
    <td class="n av" style="font-size:14px"><strong>${fmt(tot,3)} €</strong></td></tr>
    <tr style="background:var(--bg3)"><td class="lc" colspan="3"><strong>★ €/kg prodotto</strong></td>
    <td class="n gv" style="font-size:14px"><strong>${fmt(sel.ck,5)} €/kg</strong></td></tr>`);
  set('imb-note',`<strong>ℹ️</strong> REX usa il prezzo specifico per ${agr} · ${compatList.length} formati compatibili con ${agr}+${linea}`);
  const isC=compatList.includes(selKey);
  set('imb-config-box',`
    <div class="ir"><span class="ik">Packaging</span><span class="iv a">${pkg.nome}</span></div>
    <div class="ir"><span class="ik">Impianto</span><span class="iv">${pkg.imp}</span></div>
    <div class="ir"><span class="ik">Agrume</span><span class="iv">🍊 ${agr}</span></div>
    <div class="ir"><span class="ik">Linea</span><span class="iv">${linea}</span></div>
    <div class="ir"><span class="ik">Compatibilità</span><span class="iv ${isC?'g':'r'}">${isC?'✓ Compatibile':'⚠ Non compatibile'}</span></div>
    <div class="ir"><span class="ik">Peso netto / unità</span><span class="iv">${pkg.peso} kg</span></div>
    <div class="ir"><span class="ik">Costo / unità</span><span class="iv a">${fmt(sel.costo,3)} €</span></div>
    <div class="ir sep2"><span class="ik" style="font-weight:700;color:var(--txt)">★ €/kg</span><span class="iv g">${fmt(sel.ck,5)}</span></div>`);
  const maxKg=Math.max(...allE.map(([,v])=>v.ck));
  set('imb-prog-box',allE.map(([k,v])=>{
    const p=maxKg>0?v.ck/maxKg*100:0, isSel=k===selKey, isCk=compatList.includes(k);
    const cl=isSel?'fa':k===maxE[0]?'fr':k===minE[0]?'fg':isCk?'fb':'fd2';
    return `<div class="pr"><div class="prh"><span class="prl">${PKG_DATA[k].nome}${isSel?' ★':''} ${isCk?'':'<span style="color:var(--red);font-size:9px">✗</span>'}</span>
      <span class="prv" style="${isSel?'color:var(--acc)':''}">${fmt(v.ck,5)} €/kg</span></div>
      <div class="prb"><div class="prf ${cl}" style="width:${p}%;${!isCk?'opacity:.3':''}"></div></div></div>`;
  }).join(''));
  set('imb-cards',allE.map(([k,v])=>{
    const isSel=k===selKey, isCk=compatList.includes(k);
    const col=k===maxE[0]?'var(--red)':k===minE[0]?'var(--grn)':'var(--acc)';
    return `<div class="pkc ${isSel?'sel':''}" onclick="document.getElementById('i-pkg').value='${k}';runAll()"
      style="${!isCk?'opacity:.5;border-style:dashed':''}">
      <div class="pkn">${PKG_DATA[k].nome}${isSel?' ★':''}</div>
      <div class="pkw">${PKG_DATA[k].peso} kg · ${PKG_DATA[k].imp}${!isCk?' · <span style="color:var(--red);font-size:9px">✗</span>':''}</div>
      <div style="font-family:var(--fd);font-size:24px;line-height:1;color:${col};margin:5px 0 2px">${fmt(v.costo,3)}<span style="font-size:10px;color:var(--txt3);margin-left:2px">€/unità</span></div>
      <div style="font-size:11px;color:var(--txt3)">${fmt(v.ck,5)} €/kg</div></div>`;
  }).join(''));
  set('cu-impact-imb',`
    <h4>📦 Impatto su Imballaggi</h4>
    <div class="ir"><span class="ik">Formato selezionato</span><span class="iv a">${pkg.nome}</span></div>
    <div class="ir"><span class="ik">Costo €/unità</span><span class="iv a">${fmt(sel.costo,3)} €</span></div>
    <div class="ir"><span class="ik">Costo €/kg</span><span class="iv g">${fmt(sel.ck,5)} €/kg</span></div>
    <div class="ir"><span class="ik">Min €/kg (compat.)</span><span class="iv g">${PKG_DATA[minE[0]].nome}: ${fmt(minE[1].ck,5)}</span></div>
    <div class="ir"><span class="ik">Max €/kg (compat.)</span><span class="iv r">${PKG_DATA[maxE[0]].nome}: ${fmt(maxE[1].ck,5)}</span></div>
    <div class="ir"><span class="ik">Formati compatibili</span><span class="iv">${compatList.length} / ${Object.keys(PKG_DATA).length}</span></div>`);
  mkChart('ch-i-bar','bar',{
    labels:allE.map(([k])=>PKG_DATA[k].nome),
    datasets:[{data:allE.map(([,v])=>+v.ck.toFixed(5)),
      backgroundColor:allE.map(([k])=>{const iCk=compatList.includes(k);return k===selKey?COLS[0]:k===maxE[0]?COLS[3]:k===minE[0]?COLS[2]:iCk?COLS[1]:'rgba(106,114,144,.25)';}),
      borderRadius:4,borderSkipped:false}]
  },{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{...TIP,callbacks:{label:ctx=>' '+ctx.parsed.x.toFixed(5)+' €/kg'}}},scales:{x:{grid:GRID,ticks:{color:'#6a7290',callback:v=>v.toFixed(3)+'€'}},y:{grid:{display:false},ticks:{color:'#6a7290',font:{size:10}}}}});
  mkChart('ch-i-donut','doughnut',{
    labels:compData.map(c=>c.n),
    datasets:[{data:compData.map(c=>+c.val.toFixed(4)),backgroundColor:COLS,borderColor:'#1e2230',borderWidth:2,hoverOffset:6}]
  },donutOpts());
}

function exportXLSX(){
  if(!WB){ alert('Carica prima un file Excel'); return; }
  // Aggiorna le celle mappate con i valori correnti degli input
  const MAP={
    'DASHBOARD TRASF.':{B5:'t-kg'},
    'Costi unitari':{
      B3:'cu-p1',B4:'cu-p2',B5:'cu-p3',B6:'cu-p4',B7:'cu-p5',B8:'cu-p6',
      B11:'cu-p9',B12:'cu-pch',B13:'cu-ppa',B14:'cu-pdi',B15:'cu-pmi',
      B16:'cu-pco',B17:'cu-pcf',B18:'cu-pma',B22:'cu-kwh',B26:'cu-vap',
      B31:'cu-ped80',B32:'cu-ped100',B33:'cu-pedus',B34:'cu-ped120',
      B39:'cu-cart500',B40:'cu-busta500',B41:'cu-rex-lim',B42:'cu-rex-ara',
      B43:'cu-rex-ber',B44:'cu-rex-man',B49:'cu-gog',B50:'cu-cgog',
      B51:'cu-vasch',B52:'cu-cop',B53:'cu-latta',B54:'cu-pet',B62:'cu-str',
      B64:'cu-sblu',B68:'cu-fusto',B69:'cu-fbl'
    }
  };
  Object.entries(MAP).forEach(([sName,cells])=>{
    const ws=WB.Sheets[sName]; if(!ws) return;
    Object.entries(cells).forEach(([addr,inputId])=>{
      const val=gv(inputId);
      if(ws[addr]) ws[addr].v=val;
      else ws[addr]={t:'n',v:val};
    });
  });
  const outName=fileName.replace('.xlsx','')+'_PRISMA_export.xlsx';
  XLSX.writeFile(WB, outName);
  showStatus('ok','✓ File esportato: '+outName);
}
